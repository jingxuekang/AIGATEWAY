jasypt:
  encryptor:
    password: ${JASYPT_PASSWORD:dev-jasypt-password}
    algorithm: PBEWithHMACSHA512AndAES_256
    iv-generator-classname: org.jasypt.iv.NoIvGenerator

server:
  port: 9080

spring:
  application:
    name: gateway-core
  jackson:
    default-property-inclusion: non_null

# Admin service
admin:
  base-url: ${ADMIN_BASE_URL:http://localhost:9082}
  internal-secret: ${ADMIN_INTERNAL_SECRET:dev-internal-secret-change-in-prod}
  request-timeout-ms: ${ADMIN_REQUEST_TIMEOUT_MS:8000}

# Gateway
gateway:
  auth:
    enabled: true
  rate-limit:
    enabled: true
    ip-limit-enabled: true
    trust-proxy: false
  webclient:
    connect-timeout-ms: 10000
    read-timeout-ms: 120000
    max-in-memory-size-mb: 32
    timeout-seconds: 60
  budget:
    enabled: true
    global-daily-tokens: 10000000
    per-key-daily-tokens: 100000
    per-model-daily-tokens: 5000000
  pii:
    enabled: true
  prompt-guard:
    enabled: true
    max-message-length: 100000
    max-messages: 100
    regex-timeout-ms: 100
    sensitive-words-enabled: true
  cache:
    enabled: true
    max-size: 1000
    ttl-seconds: 3600
    api-key-ttl-seconds: 60
    api-key-max-size: 10000
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH

# Resilience4j
resilience4j:
  ratelimiter:
    instances:
      global:
        limit-for-period: 100
        limit-refresh-period: 1s
        timeout-duration: 0s
        register-health-indicator: true
      per-key:
        limit-for-period: 60
        limit-refresh-period: 1m
        timeout-duration: 0s
        register-health-indicator: true
      per-ip:
        limit-for-period: 200
        limit-refresh-period: 1m
        timeout-duration: 0s
        register-health-indicator: true
  circuitbreaker:
    instances:
      deepseek:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
      azure-openai:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
      azure:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
      openai:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
      anthropic:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
      volcano:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,circuitbreakers,ratelimiters
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true
    ratelimiters:
      enabled: true

# Logging
logging:
  level:
    com.aigateway: INFO
    com.aigateway.core.service: DEBUG
    org.springframework.web: WARN
    reactor.netty: WARN

# Loki
loki:
  url: http://localhost:3100

# Knife4j
knife4j:
  enable: true
  setting:
    language: zh_CN
