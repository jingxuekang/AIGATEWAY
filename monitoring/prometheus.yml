global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # gateway-core 指标（9080 端口）
  - job_name: 'gateway-core'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['localhost:9080']

  # gateway-admin 指标（9082 端口）
  - job_name: 'gateway-admin'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['localhost:9082']

  # Prometheus 自身指标
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
